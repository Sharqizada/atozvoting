services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: atozvoting-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-5000}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-voting_system}
      DB_USER: ${DB_USER:-voting_user}
      DB_PASSWORD: ${DB_PASSWORD:-voting_password}
      SUPER_ADMIN_BADGE_CODE: ${SUPER_ADMIN_BADGE_CODE:-15357920}
      SUPER_ADMIN_FULL_NAME: ${SUPER_ADMIN_FULL_NAME:-Admin User}
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME:-admin}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@inboundstar.com}
      SUPER_ADMIN_ROLE: ${SUPER_ADMIN_ROLE:-Administrator}
      SUPER_ADMIN_ACCESS_LEVEL: ${SUPER_ADMIN_ACCESS_LEVEL:-Super Administrator}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-change-this-before-live}
      SUPER_ADMIN_AVATAR_COLOR: ${SUPER_ADMIN_AVATAR_COLOR:-bg-slate-950 text-white}
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: atozvoting-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-voting_system}
      MYSQL_USER: ${DB_USER:-voting_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-voting_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
